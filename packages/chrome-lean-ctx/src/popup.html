<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>lean-ctx</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f0f1a;
      color: #e0e0e0;
      padding: 16px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid #2a2a3e;
    }
    .header h1 {
      font-size: 16px;
      color: #00d4aa;
      font-weight: 600;
    }
    .header .version {
      font-size: 11px;
      color: #666;
    }
    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 16px;
    }
    .stat-card {
      background: #1a1a2e;
      border-radius: 8px;
      padding: 12px;
      text-align: center;
    }
    .stat-value {
      font-size: 20px;
      font-weight: 700;
      color: #00d4aa;
    }
    .stat-label {
      font-size: 10px;
      color: #888;
      text-transform: uppercase;
      margin-top: 4px;
    }
    .toggle-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid #1a1a2e;
    }
    .toggle-label { font-size: 13px; }
    .toggle-hint {
      font-size: 10px;
      color: #666;
      margin-top: 2px;
    }
    .toggle {
      position: relative;
      width: 40px;
      height: 22px;
      flex-shrink: 0;
    }
    .toggle input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .toggle .slider {
      position: absolute;
      inset: 0;
      background: #333;
      border-radius: 22px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .toggle .slider::before {
      content: "";
      position: absolute;
      width: 16px;
      height: 16px;
      bottom: 3px;
      left: 3px;
      background: white;
      border-radius: 50%;
      transition: transform 0.2s;
    }
    .toggle input:checked + .slider {
      background: #00d4aa;
    }
    .toggle input:checked + .slider::before {
      transform: translateX(18px);
    }
    .footer {
      margin-top: 16px;
      text-align: center;
      font-size: 11px;
    }
    .footer a {
      color: #00d4aa;
      text-decoration: none;
    }
    .footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>lean-ctx</h1>
    <span class="version">v0.1.0</span>
  </div>

  <div class="stats">
    <div class="stat-card">
      <div class="stat-value" id="tokens-saved">0</div>
      <div class="stat-label">Tokens saved</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="commands">0</div>
      <div class="stat-label">Compressions</div>
    </div>
  </div>

  <div class="toggle-row">
    <div>
      <span class="toggle-label">Compress on send</span>
      <div class="toggle-hint">Enter &amp; Send button</div>
    </div>
    <label class="toggle">
      <input type="checkbox" id="toggle-enabled" checked>
      <span class="slider"></span>
    </label>
  </div>

  <div class="toggle-row">
    <div>
      <span class="toggle-label">Compress on paste</span>
      <div class="toggle-hint">Clipboard auto-compress</div>
    </div>
    <label class="toggle">
      <input type="checkbox" id="toggle-paste" checked>
      <span class="slider"></span>
    </label>
  </div>

  <div id="managed-banner" style="display:none;margin-top:12px;background:#1a1a2e;border:1px solid #2a2a3e;border-radius:8px;padding:10px">
    <div style="font-size:11px;color:#ff9800;margin-bottom:4px">Managed by your organization</div>
    <div id="managed-gateway" style="display:none">
      <div style="font-size:10px;color:#888;margin-bottom:2px">Org AI gateway (for CLI/IDE tools):</div>
      <div id="managed-gateway-url" style="font-family:monospace;font-size:10px;color:#00d4aa;word-break:break-all;cursor:pointer" title="Click to copy"></div>
    </div>
  </div>

  <div class="footer">
    <a href="https://leanctx.com" target="_blank">leanctx.com</a> ·
    <a href="https://github.com/yvgude/lean-ctx" target="_blank">GitHub</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
